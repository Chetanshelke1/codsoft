<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Calculator | CodSoft</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Calculator -->
    <section class="calculator-section">

        <div class="calculator">

            <!-- Top Bar -->
            <div class="top-bar">

                <h2>
                    <i class="fa-solid fa-calculator"></i>
                    Smart Calculator
                </h2>

                <div id="clock">
                    00:00:00
                </div>

            </div>

            <!-- History -->
            <div class="history" id="history">
                No Recent Calculation
            </div>

            <!-- Display -->
            <div class="display">

                <input
                    type="text"
                    id="result"
                    placeholder="0"
                    readonly>

            </div>

            <!-- Buttons -->
            <div class="buttons">

                <button class="special" onclick="clearDisplay()">
                    AC
                </button>

                <button class="special" onclick="deleteLast()">
                    DEL
                </button>

                <button class="special" onclick="appendValue('%')">
                    %
                </button>

                <button class="operator" onclick="appendValue('/')">
                    <i class="fa-solid fa-divide"></i>
                </button>

                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>

                <button class="operator" onclick="appendValue('*')">
                    <i class="fa-solid fa-xmark"></i>
                </button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>

                <button class="operator" onclick="appendValue('-')">
                    <i class="fa-solid fa-minus"></i>
                </button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>

                <button class="operator" onclick="appendValue('+')">
                    <i class="fa-solid fa-plus"></i>
                </button>

                <button onclick="appendValue('00')">
                    00
                </button>

                <button onclick="appendValue('0')">
                    0
                </button>

                <button onclick="appendValue('.')">
                    .
                </button>

                <button class="equal" onclick="calculate()">
                    =
                </button>

            </div>

            <!-- Footer -->
            <div class="calculator-footer">

                <p>
                    Designed by <strong>Kartik</strong>
                </p>

            </div>

        </div>

    </section>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
